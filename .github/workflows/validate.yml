name: Validate blueprint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml jinja2 yamllint

      - name: Lint YAML
        run: yamllint blueprints/ .yamllint

      - name: Run blueprint logic tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v
