blueprint:
  name: Passive Cooling Window Recommendation
  description: >-
    Recommends opening windows when outdoor air can meaningfully cool a warm
    room, then recommends closing them when the indoor and outdoor temperatures
    approach equilibrium.


    The blueprint compares one indoor and one outdoor temperature sensor.
    It runs an "open" action once when opening is first recommended, and a
    "close" action once when the recommendation changes back. Separate open and
    close thresholds provide hysteresis so the recommendation does not flap when
    sensor readings fluctuate around a single value.


    Optionally, provide rate-of-change (derivative) sensors for the indoor and
    outdoor temperatures. When the temperature gap is actively closing toward
    equilibrium, the blueprint recommends closing the windows EARLY to lock in
    the cooler air before the room warms back up - useful as morning
    temperatures rise. Leave the trend sensors blank for purely
    instantaneous, temperature-only behaviour.


    One automation = one room. Create a separate automation per room.


    Inspired by Adam Cornforth's Dynamic Ventilation blueprint
    (https://github.com/adamcornforth/ha-open-window-blueprint). This is an
    independent, temperature-only implementation and is not a fork of, nor
    affiliated with, that project.
  domain: automation
  source_url: https://raw.githubusercontent.com/niklasrichardson/ha-passive-cooling-blueprint/main/blueprints/automation/niklasrichardson/passive_cooling_window_recommendation.yaml
  homeassistant:
    # 2024.10 is the floor for the modern `action:` sequence syntax used in the
    # documentation and examples. The blueprint itself avoids newer features so
    # this minimum is conservative.
    min_version: 2024.10.0
  input:
    room_section:
      name: Room
      icon: mdi:home-thermometer
      collapsed: false
      input:
        room_area:
          name: Room / area (optional)
          description: >-
            Pick this room's area to auto-fill the room name (via `area_name`) —
            no need to type it below. It also helps you locate this room's
            sensors: Home Assistant's sensor pickers further down are searchable
            and grouped by area, so type the room name to narrow them. (A
            blueprint cannot auto-filter those pickers to the chosen area; that
            reactive filtering is not available to blueprints.) Leave blank to
            name the room manually instead.
          default: ""
          selector:
            area: {}
        room_name:
          name: Room name (optional if an area is selected)
          description: >-
            A friendly name for the room, exposed to your actions as the
            `room_name` variable. Leave blank to use the selected area's name
            automatically; set it to override that name.
          default: ""
          selector:
            text: {}
        inside_temperature_sensor:
          name: Indoor temperature sensor
          description: >-
            The sensor measuring the temperature inside the room.
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: temperature
        outside_temperature_sensor:
          name: Outdoor temperature sensor
          description: >-
            The sensor measuring the outdoor temperature. Use the same unit
            (°C or °F) as the indoor sensor.
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: temperature
    threshold_section:
      name: Thresholds and timing
      icon: mdi:thermometer-lines
      collapsed: false
      input:
        minimum_indoor_temperature:
          name: Minimum indoor temperature
          description: >-
            Only recommend opening windows when the room is at least this warm.
            Prevents passive-cooling recommendations during cold weather. Enter
            this value in the same unit your sensors report (°C or °F).
          default: 22.0
          selector:
            number:
              min: 0.0
              max: 45.0
              step: 0.1
              unit_of_measurement: "°"
              mode: box
        open_temperature_difference:
          name: Open-window temperature difference
          description: >-
            Recommend opening windows when the outdoor temperature is at least
            this many degrees cooler than indoors. This is the higher of the two
            hysteresis thresholds and should be GREATER than the close
            threshold.
          default: 1.0
          selector:
            number:
              min: 0.1
              max: 20.0
              step: 0.1
              unit_of_measurement: "°"
              mode: box
        close_temperature_difference:
          name: Close-window temperature difference
          description: >-
            Recommend closing windows once the outdoor temperature is no longer
            cooler than indoors by more than this many degrees. This is the
            lower of the two hysteresis thresholds and should be LESS than the
            open threshold.
          default: 0.5
          selector:
            number:
              min: 0.0
              max: 20.0
              step: 0.1
              unit_of_measurement: "°"
              mode: box
        stability_duration:
          name: Stability duration
          description: >-
            How long a recommendation must hold steady before its action runs.
            Smooths out brief sensor spikes. Applies to both the open and close
            recommendations.
          default:
            minutes: 5
          selector:
            duration: {}
    trend_section:
      name: Trend awareness (optional)
      icon: mdi:trending-up
      collapsed: true
      input:
        inside_temperature_trend:
          name: Indoor temperature trend sensor (optional)
          description: >-
            A sensor reporting the rate of change of the indoor temperature, in
            degrees per hour (for example a Derivative helper with unit_time set
            to hours). Used only for the early-close behaviour. Leave blank to
            disable trend awareness.
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
        outside_temperature_trend:
          name: Outdoor temperature trend sensor (optional)
          description: >-
            A sensor reporting the rate of change of the outdoor temperature, in
            degrees per hour. Leave blank to disable trend awareness. Provide
            both trend sensors for the most accurate result.
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
        minimum_convergence_rate:
          name: Minimum convergence rate
          description: >-
            How fast the indoor/outdoor gap must be closing, in degrees per
            hour, before an early close is recommended. The gap is closing when
            the outdoor temperature is catching up to indoors faster than the
            room itself is warming. A small value ignores sensor noise. Only
            used when at least one trend sensor is configured.
          default: 0.1
          selector:
            number:
              min: 0.0
              max: 10.0
              step: 0.1
              unit_of_measurement: "°/h"
              mode: box
    action_section:
      name: Actions
      icon: mdi:play-box-multiple
      collapsed: false
      input:
        open_action:
          name: Open-windows action
          description: |
            Runs once when opening windows is first recommended. Use any action:
            a notification, TTS, a script, a light, etc.

            Available template variables: `room_name`, `inside_temperature`,
            `outside_temperature`, `temperature_difference`, `recommendation`,
            `minimum_indoor_temperature`, `open_threshold`, `close_threshold`,
            `inside_trend`, `outside_trend`, `difference_trend`.

            Example — a mobile notification (replace `notify.notify` with your
            own service, e.g. `notify.mobile_app_<your_phone>`):

            ```yaml
            - action: notify.notify
              data:
                title: "🪟 Open windows in {{ room_name }}"
                message: >-
                  {{ room_name }} is {{ inside_temperature | round(1) }}° inside
                  and {{ outside_temperature | round(1) }}° outside
                  ({{ temperature_difference | round(1) }}° cooler out) —
                  open up to cool it down.
            ```
          selector:
            action: {}
        close_action:
          name: Close-windows action
          description: |
            Runs once when the recommendation changes to closing windows. The
            same template variables are available as for the open action.

            Example — a mobile notification (replace `notify.notify` with your
            own service):

            ```yaml
            - action: notify.notify
              data:
                title: "🌡️ Close windows in {{ room_name }}"
                message: >-
                  {{ room_name }} is {{ inside_temperature | round(1) }}° inside
                  and {{ outside_temperature | round(1) }}° outside
                  ({{ temperature_difference | round(1) }}° cooler out) —
                  close up to keep the cool in.
            ```
          selector:
            action: {}
    output_section:
      name: Recommendation output (optional)
      icon: mdi:export
      collapsed: true
      input:
        recommendation_helper:
          name: Recommendation helper (optional)
          description: >-
            Optional input_boolean that reflects this room's current
            recommendation, for dashboards. The automation turns it ON when
            opening is recommended and OFF when closing is recommended. Because
            the recommendation only changes on the open/close edges, the helper
            holds the current standing recommendation (on = open, off = close).
            Leave blank to disable. This is set in addition to — not instead of
            — your open/close actions.
          default: ""
          selector:
            entity:
              filter:
                - domain: input_boolean
    globals_thresholds_section:
      name: Global overrides — thresholds & timing (optional)
      icon: mdi:earth
      collapsed: true
      input:
        minimum_indoor_temperature_global:
          name: Minimum indoor temperature — global source (optional)
          description: >-
            Optional. Point this at a helper (typically an input_number) holding
            a shared minimum indoor temperature. When set and valid it OVERRIDES
            the per-automation number, so you can change one helper instead
            of editing every automation. Leave blank to use the number on the
            form. Changes to the helper take effect on the next trigger
            evaluation.
          default: ""
          selector:
            entity:
              filter:
                - domain: input_number
                - domain: number
                - domain: sensor
        open_temperature_difference_global:
          name: Open-window difference — global source (optional)
          description: >-
            Optional shared source for the open-window temperature difference.
            Overrides the per-automation number when set and valid. Leave blank
            to use the number on the form.
          default: ""
          selector:
            entity:
              filter:
                - domain: input_number
                - domain: number
                - domain: sensor
        close_temperature_difference_global:
          name: Close-window difference — global source (optional)
          description: >-
            Optional shared source for the close-window temperature difference.
            Overrides the per-automation number when set and valid. Leave blank
            to use the number on the form.
          default: ""
          selector:
            entity:
              filter:
                - domain: input_number
                - domain: number
                - domain: sensor
        stability_duration_global:
          name: Stability duration (minutes) — global source (optional)
          description: >-
            Optional shared source for the stability duration, interpreted in
            MINUTES (an input_number set to 5 means 5 minutes). Overrides the
            per-automation duration when set and valid. Leave blank to use the
            duration on the form. An invalid helper falls back to that duration.
          default: ""
          selector:
            entity:
              filter:
                - domain: input_number
                - domain: number
                - domain: sensor
    globals_trend_section:
      name: Global overrides — trend awareness (optional)
      icon: mdi:earth
      collapsed: true
      input:
        minimum_convergence_rate_global:
          name: Minimum convergence rate — global source (optional)
          description: >-
            Optional shared source for the minimum convergence rate (degrees per
            hour). Overrides the per-automation number when set and valid. Leave
            blank to use the number on the form.
          default: ""
          selector:
            entity:
              filter:
                - domain: input_number
                - domain: number
                - domain: sensor
    advanced_section:
      name: Additional conditions (optional)
      icon: mdi:filter-cog
      collapsed: true
      input:
        open_additional_conditions:
          name: Additional conditions for the OPEN recommendation
          description: >-
            Optional extra conditions that must all be true for the open action
            to run (for example: only when someone is home, or only at night).
            Leave empty to always allow.
          default: []
          selector:
            condition: {}
        close_additional_conditions:
          name: Additional conditions for the CLOSE recommendation
          description: >-
            Optional extra conditions that must all be true for the close action
            to run. Leave empty to always allow.
          default: []
          selector:
            condition: {}

# Run at most one instance at a time. Open and close are mutually exclusive, so
# there is no benefit to queueing; silently skip rare overlaps.
mode: single
max_exceeded: silent

# Trigger-scoped variables. Blueprint inputs are substituted in here so the
# trigger templates below can reference them. `trigger_variables` are evaluated
# once when the automation loads (they cannot read live sensor states), so we
# only place static input values here, not sensor readings.
trigger_variables:
  inside_entity: !input inside_temperature_sensor
  outside_entity: !input outside_temperature_sensor
  inside_trend_entity: !input inside_temperature_trend
  outside_trend_entity: !input outside_temperature_trend
  # Each setting has a per-automation number (..._input) and an optional global
  # source entity id (..._global). The templates below resolve the effective
  # value: the global helper when set and valid, otherwise the local number.
  min_indoor_input: !input minimum_indoor_temperature
  min_indoor_global: !input minimum_indoor_temperature_global
  open_diff_input: !input open_temperature_difference
  open_diff_global: !input open_temperature_difference_global
  close_diff_input: !input close_temperature_difference
  close_diff_global: !input close_temperature_difference_global
  converge_rate_input: !input minimum_convergence_rate
  converge_rate_global: !input minimum_convergence_rate_global
  stability_dur: !input stability_duration
  stability_global: !input stability_duration_global
  rec_helper: !input recommendation_helper

# Two template triggers. A template trigger fires only on the rising edge, when
# its template result goes from false to true, and not again until it has gone
# false in between. That edge behaviour gives us "run once per change" and
# natural de-duplication:
#   * The open trigger fires when the room first qualifies for opening.
#   * While it keeps qualifying, the template stays true and does NOT re-fire.
#   * The close trigger fires when the difference collapses to the close band.
# The open and close bands are separated by the hysteresis gap (close_diff <
# difference < open_diff), where neither template is true.
#
# Latch (when a recommendation helper is linked): the helper holds the current
# standing recommendation (on = open). The open trigger is additionally gated on
# the helper being OFF and the close trigger on it being ON, so a difference that
# merely oscillates across a threshold (without crossing into the OTHER band)
# cannot re-send the same recommendation. Without a helper linked, behaviour is
# unchanged (and such oscillation can re-fire).
#
# Trend awareness (optional) refines only the CLOSE trigger, both ways:
#   * Morning (gap closing toward equilibrium): close EARLY, inside the
#     hysteresis gap, to lock in the cooler air before the room warms back up.
#   * Evening (gap widening, outside still cooler): SUPPRESS the equilibrium
#     close so an active evening cool-down keeps ventilating.
triggers:
  - trigger: template
    id: open
    value_template: >-
      {% set inside = states(inside_entity) %}
      {% set outside = states(outside_entity) %}
      {% set min_indoor = (states(min_indoor_global) | float)
         if (min_indoor_global and is_number(states(min_indoor_global)))
         else (min_indoor_input | float) %}
      {% set open_diff = (states(open_diff_global) | float)
         if (open_diff_global and is_number(states(open_diff_global)))
         else (open_diff_input | float) %}
      {# Latch: when a helper is linked, only open if not already open. #}
      {% set has_latch = rec_helper not in ('', none) %}
      {% set may_open = (not has_latch) or (not is_state(rec_helper, 'on')) %}
      {{ is_number(inside) and is_number(outside)
         and (inside | float) >= min_indoor
         and ((inside | float) - (outside | float)) >= open_diff
         and may_open }}
    for: >-
      {{ ((states(stability_global) | float) * 60) | int
         if (stability_global and is_number(states(stability_global)))
         else ((stability_dur.get('days', 0) | int) * 86400
               + (stability_dur.get('hours', 0) | int) * 3600
               + (stability_dur.get('minutes', 0) | int) * 60
               + (stability_dur.get('seconds', 0) | int)) }}
  - trigger: template
    id: close
    value_template: >-
      {% set inside = states(inside_entity) %}
      {% set outside = states(outside_entity) %}
      {% set valid = is_number(inside) and is_number(outside) %}
      {% set diff = (inside | float(0)) - (outside | float(0)) %}
      {# Effective thresholds: global helper when set and valid, else local. #}
      {% set open_diff = (states(open_diff_global) | float)
         if (open_diff_global and is_number(states(open_diff_global)))
         else (open_diff_input | float) %}
      {% set close_diff = (states(close_diff_global) | float)
         if (close_diff_global and is_number(states(close_diff_global)))
         else (close_diff_input | float) %}
      {% set converge_rate = (states(converge_rate_global) | float)
         if (converge_rate_global and is_number(states(converge_rate_global)))
         else (converge_rate_input | float) %}
      {# Rates of change (degrees/hour); 0 when a trend sensor is not set. #}
      {% set has_in = is_number(states(inside_trend_entity)) %}
      {% set has_out = is_number(states(outside_trend_entity)) %}
      {% set inside_rate = states(inside_trend_entity) | float(0) %}
      {% set outside_rate = states(outside_trend_entity) | float(0) %}
      {# The gap closes when outside catches up faster than the room warms. #}
      {% set converging = (has_in or has_out)
         and ((inside_rate - outside_rate) <= (-1.0 * converge_rate)) %}
      {% set early_close = converging
         and (diff > close_diff)
         and (diff < open_diff) %}
      {# Evening: the gap is widening in our favour (outside dropping faster than
         the room) while outside is still cooler. Keep ventilating - suppress the
         equilibrium close so an evening cool-down isn't cut short. #}
      {% set widening = (has_in or has_out)
         and ((inside_rate - outside_rate) >= converge_rate)
         and (diff > 0) %}
      {% set base_close = (diff <= close_diff) and not widening %}
      {# Latch: when a helper is linked, only close if currently open. #}
      {% set has_latch = rec_helper not in ('', none) %}
      {% set may_close = (not has_latch) or is_state(rec_helper, 'on') %}
      {{ valid and (base_close or early_close) and may_close }}
    for: >-
      {{ ((states(stability_global) | float) * 60) | int
         if (stability_global and is_number(states(stability_global)))
         else ((stability_dur.get('days', 0) | int) * 86400
               + (stability_dur.get('hours', 0) | int) * 3600
               + (stability_dur.get('minutes', 0) | int) * 60
               + (stability_dur.get('seconds', 0) | int)) }}

# Variables exposed to BOTH user actions. Temperatures are numeric and ready to
# format, e.g. {{ inside_temperature | round(1) }}.
variables:
  room_area: !input room_area
  room_name_input: !input room_name
  # Prefer the explicit name; otherwise fall back to the selected area's name;
  # otherwise a generic label. area_name() returns None for a blank/invalid id.
  room_name: >-
    {{ room_name_input if room_name_input
       else (area_name(room_area) or 'the room' if room_area else 'the room') }}
  inside_entity: !input inside_temperature_sensor
  outside_entity: !input outside_temperature_sensor
  inside_trend_entity: !input inside_temperature_trend
  outside_trend_entity: !input outside_temperature_trend
  min_indoor_input: !input minimum_indoor_temperature
  min_indoor_global: !input minimum_indoor_temperature_global
  open_diff_input: !input open_temperature_difference
  open_diff_global: !input open_temperature_difference_global
  close_diff_input: !input close_temperature_difference
  close_diff_global: !input close_temperature_difference_global
  # Effective thresholds exposed to actions: global helper when set and valid,
  # otherwise the per-automation number (matching the trigger logic).
  minimum_indoor_temperature: >-
    {{ (states(min_indoor_global) | float)
       if (min_indoor_global and is_number(states(min_indoor_global)))
       else (min_indoor_input | float) }}
  open_threshold: >-
    {{ (states(open_diff_global) | float)
       if (open_diff_global and is_number(states(open_diff_global)))
       else (open_diff_input | float) }}
  close_threshold: >-
    {{ (states(close_diff_global) | float)
       if (close_diff_global and is_number(states(close_diff_global)))
       else (close_diff_input | float) }}
  inside_temperature: "{{ states(inside_entity) | float(0) }}"
  outside_temperature: "{{ states(outside_entity) | float(0) }}"
  temperature_difference: >-
    {{ ((states(inside_entity) | float(0))
        - (states(outside_entity) | float(0))) | round(2) }}
  inside_trend: "{{ states(inside_trend_entity) | float(0) }}"
  outside_trend: "{{ states(outside_trend_entity) | float(0) }}"
  difference_trend: >-
    {{ ((states(inside_trend_entity) | float(0))
        - (states(outside_trend_entity) | float(0))) | round(2) }}
  recommendation: "{{ 'Open windows' if trigger.id == 'open' else 'Close windows' }}"
  recommendation_helper: !input recommendation_helper

# Belt-and-suspenders guard: never run an action unless BOTH sensors hold valid
# numbers right now. The triggers already require this, but a sensor can drop to
# unavailable in the brief window between the trigger firing and the action
# running. Invalid states (unknown, unavailable, none, "", non-numeric) are
# rejected here and are never treated as 0.
conditions:
  - condition: template
    value_template: >-
      {{ is_number(states(inside_entity)) and is_number(states(outside_entity)) }}

# Branch on which trigger fired and apply that recommendation's optional extra
# conditions. An `and` over an empty condition list evaluates to true, so when a
# user leaves the optional conditions empty the branch always runs.
actions:
  - choose:
      - conditions:
          - condition: trigger
            id: open
          - condition: and
            conditions: !input open_additional_conditions
        sequence:
          # Reflect the recommendation in the optional helper (on = open), only
          # when one is configured. choose/default runs the user action list.
          - if:
              - condition: template
                value_template: "{{ recommendation_helper not in ('', none) }}"
            then:
              - action: input_boolean.turn_on
                target:
                  entity_id: !input recommendation_helper
          - choose: []
            default: !input open_action
      - conditions:
          - condition: trigger
            id: close
          - condition: and
            conditions: !input close_additional_conditions
        sequence:
          - if:
              - condition: template
                value_template: "{{ recommendation_helper not in ('', none) }}"
            then:
              - action: input_boolean.turn_off
                target:
                  entity_id: !input recommendation_helper
          - choose: []
            default: !input close_action
