# Standalone "rooms" dashboard for the Passive Cooling Window Recommendation
# blueprint. Each room shows a colored tile driven by its optional
# recommendation helper (input_boolean): the tile lights up (green) when opening
# is recommended and is grey when closing is recommended.
#
# Requires the per-room input_boolean helpers (see recommendation_helpers.yaml)
# and the blueprint's "Recommendation helper" output linked in each automation.
#
# Install: Settings -> Dashboards -> + Add dashboard -> New dashboard from
# scratch -> open it -> Edit -> (three dots) -> Raw configuration editor ->
# paste. Adjust the entity ids to match your rooms.

title: Passive Cooling
views:
  - title: Rooms
    path: rooms
    type: sections
    max_columns: 3
    sections:
      - type: grid
        title: Recommendation
        cards:
          - type: tile
            entity: input_boolean.passive_cooling_master_bedroom
            name: Master Bedroom
            icon: mdi:window-open-variant
            color: green
          - type: tile
            entity: input_boolean.passive_cooling_study
            name: Study
            icon: mdi:window-open-variant
            color: green
      - type: grid
        title: Temperatures
        cards:
          - type: tile
            entity: sensor.master_bedroom_temperature
            name: Master Bedroom
          - type: tile
            entity: sensor.study_temperature
            name: Study
          - type: tile
            entity: sensor.average_outside_temperature
            name: Outside
