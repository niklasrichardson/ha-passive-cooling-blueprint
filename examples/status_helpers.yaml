# Per-room status helpers for the Passive Cooling Window Recommendation
# blueprint's optional "Status output" / "Status helper".
#
# Two parts per room:
#   1. an input_boolean the automation writes to (on = open recommended), and
#   2. a template binary_sensor (device_class: window) that mirrors it. With the
#      window device class the tile shows "Open"/"Closed", a window icon that
#      changes with state, and state-based colour. It also carries the room's
#      current temperature as an attribute, so a single tile can show the
#      recommendation and the temperature together.
#
# Link the input_boolean in each automation's "Status output (optional)"
# section; point your dashboard tiles at the binary_sensor.
#
# Install: paste into configuration.yaml (or use as a package), then restart.
# Adjust the temperature sensor entity ids to match your rooms.

input_boolean:
  passive_cooling_master_bedroom:
    name: Passive Cooling – Master Bedroom
    icon: mdi:window-open-variant
  passive_cooling_study:
    name: Passive Cooling – Study
    icon: mdi:window-open-variant

template:
  - binary_sensor:
      - name: Master Bedroom windows
        device_class: window
        state: "{{ is_state('input_boolean.passive_cooling_master_bedroom', 'on') }}"
        icon: >-
          {{ 'mdi:window-open-variant'
             if is_state('input_boolean.passive_cooling_master_bedroom', 'on')
             else 'mdi:window-closed-variant' }}
        attributes:
          temperature: >-
            {{ states('sensor.master_bedroom_temperature') | float(0) | round(1) }}°
      - name: Study windows
        device_class: window
        state: "{{ is_state('input_boolean.passive_cooling_study', 'on') }}"
        icon: >-
          {{ 'mdi:window-open-variant'
             if is_state('input_boolean.passive_cooling_study', 'on')
             else 'mdi:window-closed-variant' }}
        attributes:
          temperature: >-
            {{ states('sensor.study_temperature') | float(0) | round(1) }}°
